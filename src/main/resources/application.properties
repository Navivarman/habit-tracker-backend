# Server Configuration
server.port=8081

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/habit_tracker
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Temporary Security Bypass (For Phase 2 Testing)
# This prevents Spring Security from locking down your APIs with a login screen 
# before we are ready to implement JWT login tokens.
spring.security.user.name=admin
spring.security.user.password=admin